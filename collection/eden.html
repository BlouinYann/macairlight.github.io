<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail Projet | Macair'Light</title>
    
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<canvas id="particleCanvas"></canvas>
    <div id="header-placeholder"></div>

    <main>
        <article class="project-container">
            <div class="project-meta">
                <span id="auto-date" class="meta-date"></span>
                <span id="auto-category" class="meta-category"></span>
            </div>

            <h1 class="project-title">Chargement...</h1>
            
            <p class="project-description">
                Description du projet à modifier manuellement pour chaque page projet. 
                Ce texte présente les grandes lignes de la réalisation.
            </p>

            <div class="carousel-container">
                <button class="carousel-btn prev" onclick="moveSlide(-1)">&#10094;</button>

                <div class="carousel-container">
                <button class="carousel-btn prev" onclick="moveSlide(-1)">&#10094;</button>

                <div class="project-carousel">
                    <div class="carousel-track" id="track">
                        <img src="../Images/eden.avif" alt="Eden Worth">
                        <img src="../Images/eden2.jpg" alt="Eden Worth">
                        <img src="../Images/eden3.jpg" alt="Eden Worth">
                    </div>
                </div>

                <button class="carousel-btn next" onclick="moveSlide(1)">&#10095;</button>
            </div>
            <figcaption class="copyright-text">© Crédits photographiques : 1picday_maximesphotographie — Balayez pour voir plus
            </figcaption>

            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/9RjDioSbmuk" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>

            <div class="project-footer-text" hidden>
                Texte de conclusion technique ou artistique sur le projet.
            </div>

            <div class="actions">
                <a href="/" class="btn-back">retour aux collections</a>
            </div>
        </article>
    </main>

    <div id="footer-placeholder"></div>
<script src="../particles-config.js"></script>
<script src="../collections.js"></script>
<script src="../icon.js"></script>
</body>
</html>
