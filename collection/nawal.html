<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail Projet | Macair'Light</title>
    
    <link rel="stylesheet" href="../style.css">
    </head>
<body>
<canvas id="particleCanvas"></canvas>
    <div id="header-placeholder"></div>

    <main>
        <article class="project-container">
            <div class="project-meta">
                <span id="auto-date" class="meta-date"></span>
                <span id="auto-category" class="meta-category"></span>
            </div>

            <h1 class="project-title">Chargement...</h1>
            
            <p class="project-description">
                Création lumière pour les etudiants du DEUST Théâtre de Besançon sur une réécriture de l'oeuvre de Wajdi Mouawad <i>Incendies</i>.
            </p>

            <div class="carousel-container">
                <button class="carousel-btn prev" onclick="moveSlide(-1)">&#10094;</button>

                <div class="project-carousel">
                    <div class="carousel-track" id="track">
                        <img src="../Images/nawal2.jpg" alt="La Culpabilité">
                        <img src="../Images/nawal3.jpg" alt="La Naissance">
                        <img src="../Images/nawal4.jpg" alt="La Guerre">
                    </div>
                </div>

                <button class="carousel-btn next" onclick="moveSlide(1)">&#10095;</button>
            </div>
            <figcaption class="copyright-text">© Crédits photographiques : ilona.gllnd et _shotbylp — Balayez pour voir plus
            </figcaption>

            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/hab7_5feNvY" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>

            <div class="project-footer-text">
                Création sur <u>GrandMA2</u>
            </div>

            <div class="actions">
                <a href="../collection/" class="btn-back">retour aux collections</a>
            </div>
        </article>
    </main>

    <div id="footer-placeholder"></div>
<script src="../particles-config.js"></script>
<script src="../collections.js"></script>
<script src="../icon.js"></script>
    <script src="../telephone.js"></script>


</body>
</html>
