<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail Projet | Macair'Light</title>
    
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<canvas id="particleCanvas"></canvas>
    <div id="header-placeholder"></div>

    <main>
        <article class="project-container">
            <div class="project-meta">
                <span id="auto-date" class="meta-date"></span>
                <span id="auto-category" class="meta-category"></span>
            </div>

            <h1 class="project-title">Chargement...</h1>
            
            <p class="project-description">
                Programmation d'un spectacle de jets d'eau pour la Fête Nationale de Crans Montana. Via Aquatique Show.
            </p>

            <div class="carousel-container">
                <button class="carousel-btn prev" onclick="moveSlide(-1)">&#10094;</button>

                <div class="project-carousel">
                    <div class="carousel-track" id="track">
                        <img src="../Images/crans_montana2025.1.png" alt="">
                        <img src="../Images/crans_montana2025.2.png" alt="">
                        <img src="../Images/crans_montana2025.3.png" alt="">
                        <img src="../Images/crans_montana2025.4.png" alt="">
                    </div>
                </div>

                <button class="carousel-btn next" onclick="moveSlide(1)">&#10095;</button>
            </div>
            <figcaption class="copyright-text">© Crédits photographiques : SBK Laser — Balayez pour voir plus
            </figcaption>

            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/Cp_EhOR35BI" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>

            <div class="project-footer-text" >
                Timecode sur <u>GrandMA2</u> et visualisation sur <u>Depence R4</u>
            </div>

            <div class="actions">
                <a href="../collection/" class="btn-back">retour aux collections</a>
            </div>
        </article>
    </main>

    <div id="footer-placeholder"></div>
<script src="../particles-config.js"></script>
<script src="../collections.js"></script>
<script src="../icon.js"></script>
    <script src="../telephone.js"></script>

</body>
</html>
