<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci | Macair'Light</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div id="header-placeholder"></div>

    <main class="thanks-page">
        <div class="success-icon">
            <i class="fas fa-paper-plane"></i>
        </div>
        <h1 class="logo-central">Merci</h1>
        <p class="thanks-message">Votre message a été transmis avec succès.<br>Sculptons ensemble votre prochain projet.</p>
        <a href="index.html" class="filter-btn active">Retour à l'accueil</a>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../particles-config.js"></script>
    <script>
        // Chargement Header/Footer
        function loadComponent(id, file) {
            fetch(file).then(r => r.text()).then(d => { document.getElementById(id).innerHTML = d; });
        }
        loadComponent('header-placeholder', '../header.html');
        loadComponent('footer-placeholder', '../footer.html');
    </script>
</body>
</html>
