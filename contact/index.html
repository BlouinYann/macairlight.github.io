<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Macair'Light</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div id="header-placeholder"></div>

    <main class="contact-page">
        <header class="collections-header">
            <h1>Contact</h1>
            <p style="text-align: center; color: rgba(255,255,255,0.6); margin-top: 10px;">
                Une question, un projet ou une collaboration ? Parlons-en.
            </p>
        </header>

        <section class="contact-container">
            <form id="contact-form" action="https://formspree.io/f/xaqdvllq" method="POST" class="contact-form">
                <div class="form-group">
                    <label>Nom & Prénom</label>
                    <input type="text" name="name" required placeholder="Votre nom">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="_replyto" required placeholder="votre@email.com">
                </div>

                <div class="form-group">
                    <label>Sujet</label>
                    <input type="text" name="subject" placeholder="L'objet de votre message">
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea name="message" rows="6" required placeholder="Décrivez votre projet..."></textarea>
                </div>

                <button type="submit" id="submit-btn" class="submit-btn">Envoyer le message</button>
            </form>
        </section>
    </main>

    <div class="direct-contact">
        <div class="contact-info-box">
            <span class="label">Email Direct</span>
            <a href="mailto:contact@macairlight.fr" class="email-link">contact@macairlight.fr</a>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script>
        // 1. Chargement des composants Header/Footer
        function loadComponent(id, file) {
            fetch(file).then(r => r.text()).then(d => { document.getElementById(id).innerHTML = d; });
        }
        loadComponent('header-placeholder', '../header.html');
        loadComponent('footer-placeholder', '../footer.html');

        // 2. Logique d'envoi AJAX pour redirection personnalisée gratuite
        const form = document.getElementById("contact-form");
        const btn = document.getElementById("submit-btn");

        async function handleSubmit(event) {
            event.preventDefault(); // Empêche Formspree de charger sa propre page
            
            const data = new FormData(event.target);
            btn.innerHTML = "Envoi en cours...";
            btn.style.opacity = "0.5";
            btn.disabled = true;

            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    // REDIRECTION VERS TA PAGE PERSONNALISÉE
                    window.location.href = "merci.html";
                } else {
                    btn.innerHTML = "Erreur...";
                    btn.style.opacity = "1";
                    btn.disabled = false;
                    alert("Oups ! Un problème est survenu lors de l'envoi.");
                }
            }).catch(error => {
                btn.innerHTML = "Erreur réseau";
                btn.disabled = false;
                alert("Erreur de connexion au serveur.");
            });
        }
        form.addEventListener("submit", handleSubmit);
    </script>
    
    <script src="../particles-config.js"></script>
    <script src="../telephone.js"></script>
    <script src="../icon.js"></script>
</body>
</html>
